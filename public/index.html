<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연합 교류활동 만족도 조사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23243a;
    --bg1:#ffd86b;
    --bg2:#ff9a8b;
    --bg3:#7ee8c2;
    --bg4:#86b6ff;
    --card:#fffdf7;
    --accent:#ff5d73;
    --accent2:#ffb03a;
    --mint:#2fc6a0;
    --blue:#4f7dff;
    --soft:#fff2cf;
    --line:#ece4d2;
    --shadow:0 18px 40px -18px rgba(60,40,20,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,#ffe9a8,#ffd0c4 38%,#bff0e0 70%,#bcd4ff);
    background-size:200% 200%;
    animation:bgShift 18s ease infinite;
    min-height:100%;
    display:flex;align-items:center;justify-content:center;
    padding:18px;
    overflow-x:hidden;
  }
  @keyframes bgShift{0%{background-position:0 0}50%{background-position:100% 100%}100%{background-position:0 0}}

  /* floating doodles */
  .doodle{position:fixed;font-size:2.2rem;opacity:.5;pointer-events:none;animation:float 7s ease-in-out infinite;z-index:0;filter:drop-shadow(0 6px 8px rgba(0,0,0,.06));}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-22px) rotate(8deg)}}

  .wrap{width:100%;max-width:560px;position:relative;z-index:2;}

  .card{
    background:var(--card);
    border-radius:30px;
    box-shadow:var(--shadow);
    border:3px solid #fff;
    padding:30px 26px 26px;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:27px;
    border:2px dashed #f0e2c4;margin:8px;pointer-events:none;opacity:.7;
  }

  /* progress */
  .progress-top{display:flex;align-items:center;gap:12px;margin-bottom:20px;position:relative;z-index:3;}
  .bar{flex:1;height:14px;background:#f1ead8;border-radius:20px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.06);}
  .bar > i{display:block;height:100%;width:0;border-radius:20px;
    background:linear-gradient(90deg,var(--accent2),var(--accent),var(--mint));
    background-size:200% 100%;transition:width .5s cubic-bezier(.34,1.56,.64,1);animation:flow 3s linear infinite;}
  @keyframes flow{to{background-position:200% 0}}
  .pct{font-family:'Jua';font-size:.95rem;color:var(--accent);min-width:42px;text-align:right;}

  /* steps */
  .step{display:none;animation:pop .45s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:3;}
  .step.active{display:block;}
  @keyframes pop{0%{opacity:0;transform:translateY(24px) scale(.96)}100%{opacity:1;transform:translateY(0) scale(1)}}

  .qnum{font-family:'Jua';font-size:.9rem;color:var(--accent2);letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
  .qnum .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .qtext{font-family:'Jua';font-size:1.5rem;line-height:1.45;margin-bottom:4px;}
  .qhint{font-size:.92rem;color:#9b8f78;margin-bottom:20px;}

  /* choice buttons */
  .choices{display:flex;flex-direction:column;gap:11px;}
  .choices.grid2{display:grid;grid-template-columns:1fr 1fr;}
  .opt{
    font-family:'Gowun Dodum';font-size:1.02rem;
    background:#fff;border:2.5px solid var(--line);border-radius:18px;
    padding:15px 16px;cursor:pointer;text-align:left;color:var(--ink);
    transition:transform .15s,border-color .2s,background .2s,box-shadow .2s;
    display:flex;align-items:center;gap:10px;
  }
  .opt .em{font-size:1.25rem;}
  .opt:hover{transform:translateY(-3px);border-color:var(--accent2);box-shadow:0 10px 18px -10px rgba(255,140,40,.5);}
  .opt:active{transform:scale(.97);}
  .opt.sel{background:linear-gradient(135deg,#fff3e0,#ffe1e6);border-color:var(--accent);box-shadow:0 10px 20px -10px rgba(255,93,115,.55);}
  .opt.sel::after{content:"✓";margin-left:auto;font-family:'Jua';color:var(--accent);font-size:1.2rem;}

  /* emoji scale (likert) */
  .scale{display:flex;justify-content:space-between;gap:6px;}
  .face{
    flex:1;background:#fff;border:2.5px solid var(--line);border-radius:18px;
    padding:13px 4px 9px;cursor:pointer;text-align:center;
    transition:transform .15s,border-color .2s,background .2s;
  }
  .face .fe{font-size:1.7rem;display:block;filter:grayscale(.4);transition:.2s;}
  .face .fl{font-size:.7rem;color:#9b8f78;margin-top:5px;display:block;line-height:1.2;}
  .face:hover{transform:translateY(-4px) scale(1.05);border-color:var(--accent2);}
  .face:hover .fe{filter:grayscale(0);}
  .face.sel{background:linear-gradient(135deg,#fff0d6,#ffe2e7);border-color:var(--accent);transform:translateY(-4px) scale(1.06);}
  .face.sel .fe{filter:grayscale(0);transform:scale(1.15);}

  /* text input */
  textarea,input[type=text]{
    width:100%;font-family:'Gowun Dodum';font-size:1rem;color:var(--ink);
    border:2.5px solid var(--line);border-radius:18px;padding:14px 16px;
    background:#fff;resize:none;transition:border-color .2s,box-shadow .2s;
  }
  textarea:focus,input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 4px #ffe9c8;}
  textarea{min-height:120px;}

  /* nav */
  .nav{display:flex;gap:12px;margin-top:24px;}
  .btn{
    font-family:'Jua';font-size:1.05rem;border:none;cursor:pointer;border-radius:16px;
    padding:14px 10px;transition:transform .15s,box-shadow .2s,opacity .2s;
  }
  .btn-next{flex:1;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 12px 22px -10px rgba(255,93,115,.7);}
  .btn-next:hover{transform:translateY(-2px);}
  .btn-next:active{transform:scale(.97);}
  .btn-next:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-prev{flex:0 0 96px;background:#f3ecdb;color:#9b8f78;}
  .btn-prev:hover{background:#ece2cc;}
  .btn-skip{flex:0 0 auto;background:transparent;color:#b6a98f;text-decoration:underline;box-shadow:none;font-size:.95rem;padding:14px 8px;}

  /* intro */
  .intro{text-align:center;padding:6px 4px 4px;}
  .intro .mascot{font-size:4.2rem;animation:wiggle 2.2s ease-in-out infinite;display:inline-block;}
  @keyframes wiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  .intro h1{font-family:'Jua';font-size:1.9rem;line-height:1.35;margin:14px 0 6px;}
  .intro h1 .hl{color:var(--accent);}
  .intro .sub{color:#8d8169;font-size:1rem;line-height:1.6;margin-bottom:8px;}
  .meta-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 22px;}
  .chip{background:var(--soft);border:2px solid #ffe2a8;border-radius:30px;padding:7px 14px;font-size:.85rem;font-family:'Gaegu';font-weight:700;color:#c9821b;}

  /* end */
  .done{text-align:center;display:none;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
  .done.active{display:block;}
  .done .big{font-size:4.6rem;animation:bounce 1.6s ease infinite;display:inline-block;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  .done h2{font-family:'Jua';font-size:1.8rem;margin:10px 0 8px;}
  .done p{color:#8d8169;line-height:1.6;margin-bottom:20px;}

  .summary{text-align:left;background:#fff8ea;border:2px dashed #ffd98a;border-radius:18px;padding:16px 18px;margin-bottom:18px;max-height:280px;overflow:auto;}
  .summary h3{font-family:'Jua';color:var(--accent);font-size:1rem;margin-bottom:10px;}
  .sumrow{font-size:.9rem;padding:7px 0;border-bottom:1px dashed #f0e2c4;line-height:1.5;}
  .sumrow:last-child{border-bottom:none;}
  .sumrow b{color:#a8762a;}

  .confetti{position:fixed;top:-20px;width:11px;height:14px;z-index:50;border-radius:2px;pointer-events:none;}

  @media(max-width:480px){
    .card{padding:24px 18px 20px;border-radius:24px;}
    .qtext{font-size:1.3rem;}
    .intro h1{font-size:1.6rem;}
    .scale{gap:4px;}
    .face .fe{font-size:1.4rem;}
    .face .fl{font-size:.62rem;}
    .doodle{display:none;}
  }
</style>
</head>
<body>

<div class="doodle" style="top:8%;left:6%;">⭐</div>
<div class="doodle" style="top:18%;right:8%;animation-delay:1.4s;">🎈</div>
<div class="doodle" style="bottom:14%;left:9%;animation-delay:.8s;">💬</div>
<div class="doodle" style="bottom:10%;right:7%;animation-delay:2s;">✨</div>
<div class="doodle" style="top:46%;left:3%;animation-delay:1.1s;">🎉</div>

<div class="wrap">
  <div class="card">

    <div class="progress-top" id="progressTop" style="display:none;">
      <div class="bar"><i id="barFill"></i></div>
      <span class="pct" id="pctLabel">0%</span>
    </div>

    <!-- INTRO -->
    <div class="step active" id="introStep">
      <div class="intro">
        <span class="mascot">🤗</span>
        <h1>오늘 <span class="hl">함께한 시간</span>,<br>어땠어?</h1>
        <p class="sub">2026 포천·가평 청소년자치기구<br>연합 교류활동 만족도 조사</p>
        <div class="meta-chips">
          <span class="chip">⏱ 약 2분</span>
          <span class="chip">🙊 익명</span>
          <span class="chip">💡 정답 없음</span>
        </div>
        <p class="sub" style="font-size:.9rem;">너의 솔직한 한마디가 다음 활동을 더 멋지게 만들어!</p>
      </div>
      <div class="nav">
        <button class="btn btn-next" onclick="start()">시작할게요 🚀</button>
      </div>
    </div>

    <!-- QUESTIONS injected here -->
    <div id="questionHost"></div>

    <!-- DONE -->
    <div class="done" id="doneStep">
      <span class="big">🥳</span>
      <h2>다 끝났어요!</h2>
      <p>소중한 의견 고마워요.<br>덕분에 다음 활동이 더 멋져질 거예요 💛</p>
      <p id="saveStatus" style="font-family:'Jua';font-size:1rem;margin:-8px 0 16px;color:#b6a98f;">💾 응답 저장 중…</p>
      <div class="summary" id="summaryBox"></div>
      <div class="nav">
        <button class="btn btn-prev" style="flex:1;" onclick="restart()">다시하기</button>
        <button class="btn btn-next" onclick="downloadAnswers()">내 응답 저장 ⬇</button>
      </div>
    </div>

  </div>
</div>

<script>
// ---------- 설문 정의 ----------
const FACES = [
  {fe:"😍",fl:"매우 그렇다",v:5},
  {fe:"🙂",fl:"그렇다",v:4},
  {fe:"😐",fl:"보통",v:3},
  {fe:"😕",fl:"그렇지 않다",v:2},
  {fe:"😣",fl:"전혀 아니다",v:1},
];

const questions = [
  // 기본정보
  {sec:"기본 정보", type:"choice", q:"어디 소속이야?", hint:"하나만 골라줘",
   opts:[
     {em:"🟦",t:"포천시 청소년참여위원회"},
     {em:"🟩",t:"포천시 청소년운영위원회"},
     {em:"🟨",t:"가평군 청소년참여위원회"},
     {em:"🟧",t:"가평군 청소년운영위원회"},
   ]},
  {sec:"기본 정보", type:"choice", grid:true, q:"학교급이 어떻게 돼?", hint:"",
   opts:[{em:"📗",t:"중학생"},{em:"📘",t:"고등학생"},{em:"🌱",t:"학교 밖 청소년"},{em:"✏️",t:"기타"}]},
  {sec:"기본 정보", type:"choice", grid:true, q:"자치기구 활동은 얼마나 했어?", hint:"",
   opts:[{em:"🐣",t:"6개월 미만"},{em:"🌼",t:"6개월~1년"},{em:"🌳",t:"1~2년"},{em:"👑",t:"2년 이상"}]},

  // 전반 만족도
  {sec:"전반적 만족도", type:"scale", q:"오늘 활동, 전체적으로 만족했어?", hint:"얼굴을 톡 눌러줘"},
  {sec:"전반적 만족도", type:"scale", q:"일정이랑 시간 배분은 적절했어?", hint:""},
  {sec:"전반적 만족도", type:"scale", q:"장소랑 시설은 활동하기 좋았어?", hint:""},
  {sec:"전반적 만족도", type:"scale", q:"안전교육·안전관리는 잘 됐어?", hint:""},
  {sec:"전반적 만족도", type:"scale", q:"운영진(담당자·강사)이 친절하고 진행이 매끄러웠어?", hint:""},
  {sec:"전반적 만족도", type:"scale", q:"이런 교류활동, 다음에 또 오고 싶어?", hint:""},

  // 프로그램별
  {sec:"프로그램별", type:"scale", q:"🎤 자치기구 소개·활동 발표는 어땠어?", hint:""},
  {sec:"프로그램별", type:"scale", q:"📚 청소년 참여(활동) 교육은 어땠어?", hint:""},
  {sec:"프로그램별", type:"scale", q:"🎮 교류활동(레크리에이션)은 어땠어?", hint:""},
  {sec:"프로그램별", type:"scale", q:"💬 소감 나누기·네트워킹 시간은 어땠어?", hint:""},
  {sec:"프로그램별", type:"scale", q:"🍱 점심·휴식 시간 운영은 어땠어?", hint:""},

  // 성과
  {sec:"오늘의 수확", type:"scale", q:"다른 지역 친구들이랑 새롭게 친해질 수 있었어?", hint:""},
  {sec:"오늘의 수확", type:"scale", q:"다른 자치기구 활동에서 배운 점이 있었어?", hint:""},
  {sec:"오늘의 수확", type:"scale", q:"내가 주도적으로 참여할 기회가 있었어?", hint:""},
  {sec:"오늘의 수확", type:"scale", q:"함께·협력의 중요함을 느꼈어?", hint:""},
  {sec:"오늘의 수확", type:"scale", q:"청소년 자치활동에 더 관심이 생겼어?", hint:""},

  // 정례화 선택
  {sec:"자유 의견", type:"choice", q:"이런 연합 교류활동, 정기적으로 하면 어떨까?", hint:"",
   opts:[{em:"🔥",t:"매우 필요해"},{em:"👍",t:"필요해"},{em:"🤔",t:"보통이야"},{em:"🙅",t:"필요 없어"}]},

  // 주관식
  {sec:"자유 의견", type:"text", q:"가장 좋았던 점이나 기억에 남는 활동은? ✨", hint:"한 줄도 좋아!", ph:"예) 레크리에이션 때 다른 학교 친구랑 한 팀이 돼서…"},
  {sec:"자유 의견", type:"text", q:"아쉬웠던 점이나 고쳤으면 하는 게 있어? 🛠", hint:"솔직할수록 도움이 돼", ph:"자유롭게 적어줘"},
  {sec:"자유 의견", type:"text", q:"다음엔 어떤 활동을 같이 해보고 싶어? 💭", hint:"", ph:"하고 싶은 프로그램, 가고 싶은 곳 무엇이든!"},
  {sec:"자유 의견", type:"text", q:"운영진에게 한마디! 💌", hint:"응원도, 부탁도 환영", ph:"", optional:true},
];

const answers = {};
let idx = 0;
const host = document.getElementById("questionHost");

function buildStep(qi){
  const q = questions[qi];
  const div = document.createElement("div");
  div.className = "step";
  div.id = "step"+qi;

  let inner = `<div class="qnum"><span class="dot"></span>${q.sec} · ${qi+1} / ${questions.length}</div>`;
  inner += `<div class="qtext">${q.q}</div>`;
  if(q.hint) inner += `<div class="qhint">${q.hint}</div>`;
  else inner += `<div style="height:8px"></div>`;

  if(q.type==="scale"){
    inner += `<div class="scale">`;
    FACES.forEach(f=>{
      inner += `<div class="face" data-v="${f.v}" onclick="pickScale(${qi},${f.v},this)">
        <span class="fe">${f.fe}</span><span class="fl">${f.fl}</span></div>`;
    });
    inner += `</div>`;
  } else if(q.type==="choice"){
    inner += `<div class="choices ${q.grid?'grid2':''}">`;
    q.opts.forEach((o,i)=>{
      inner += `<button class="opt" onclick="pickChoice(${qi},${i},this)"><span class="em">${o.em}</span>${o.t}</button>`;
    });
    inner += `</div>`;
  } else if(q.type==="text"){
    inner += `<textarea data-qi="${qi}" placeholder="${q.ph||'여기에 적어줘'}" oninput="onText(${qi},this)"></textarea>`;
  }

  // nav
  inner += `<div class="nav">`;
  inner += `<button class="btn btn-prev" onclick="prev()">← 이전</button>`;
  if(q.optional || q.type==="text"){
    inner += `<button class="btn btn-skip" onclick="next()">건너뛰기</button>`;
  }
  const lastIdx = questions.length-1;
  const label = qi===lastIdx ? "제출하기 🎯" : "다음 →";
  inner += `<button class="btn btn-next" id="next${qi}" ${q.type==='text'?'':'disabled'} onclick="next()">${label}</button>`;
  inner += `</div>`;

  div.innerHTML = inner;
  host.appendChild(div);
}
questions.forEach((_,i)=>buildStep(i));

function show(i){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("doneStep").classList.remove("active");
  if(i<0){ document.getElementById("introStep").classList.add("active"); return; }
  if(i>=questions.length){ finish(); return; }
  document.getElementById("step"+i).classList.add("active");
  updateProgress(i);
}

function updateProgress(i){
  const top = document.getElementById("progressTop");
  top.style.display = "flex";
  const pct = Math.round(((i)/(questions.length))*100);
  document.getElementById("barFill").style.width = pct+"%";
  document.getElementById("pctLabel").textContent = pct+"%";
}

function start(){ idx=0; show(0); }

function pickScale(qi,v,el){
  answers[qi]={type:"scale",value:v,label:FACES.find(f=>f.v===v).fl};
  el.parentNode.querySelectorAll(".face").forEach(f=>f.classList.remove("sel"));
  el.classList.add("sel");
  document.getElementById("next"+qi).disabled=false;
  setTimeout(()=>next(),320); // 살짝 보여주고 자동 진행
}

function pickChoice(qi,i,el){
  const q=questions[qi];
  answers[qi]={type:"choice",value:i,label:q.opts[i].t};
  el.parentNode.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  el.classList.add("sel");
  document.getElementById("next"+qi).disabled=false;
  setTimeout(()=>next(),320);
}

function onText(qi,el){
  answers[qi]={type:"text",value:el.value.trim(),label:el.value.trim()};
}

function next(){
  if(idx>=questions.length-1){ finish(); return; }
  idx++; show(idx);
}
function prev(){
  if(idx<=0){ idx=-1; show(-1); document.getElementById("progressTop").style.display="none"; return; }
  idx--; show(idx);
}

let submitted=false;
function finish(){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("barFill").style.width="100%";
  document.getElementById("pctLabel").textContent="100%";
  document.getElementById("doneStep").classList.add("active");
  renderSummary();
  burst();
  sendToServer();
}

// ----- 서버(D1)로 응답 전송 -----
function sendToServer(){
  if(submitted) return;          // 중복 전송 방지
  submitted=true;
  const statusEl=document.getElementById("saveStatus");

  // 사람이 보기 좋은 형태로 정리해서 전송
  const record={};
  questions.forEach((q,i)=>{
    const a=answers[i];
    let v="";
    if(a){
      if(a.type==="scale") v=a.value;            // 점수(1~5)
      else v=a.label;                            // 선택지 텍스트 / 주관식 텍스트
    }
    record["q"+(i+1)]={section:q.sec, question:q.q, answer:v};
  });

  fetch("/api/submit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({answers:record})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d && d.ok){ statusEl.innerHTML="✅ 응답이 안전하게 제출되었어요!"; statusEl.style.color="#2fc6a0"; }
    else throw new Error(d && d.error ? d.error : "unknown");
  })
  .catch(err=>{
    statusEl.innerHTML="⚠️ 제출 중 문제가 생겼어요. 잠시 후 다시 시도해줘.";
    statusEl.style.color="#ff5d73";
    submitted=false;            // 실패 시 재시도 허용
    console.error("submit error:",err);
  });
}

function renderSummary(){
  const box=document.getElementById("summaryBox");
  let html=`<h3>📋 내 응답 요약</h3>`;
  questions.forEach((q,i)=>{
    const a=answers[i];
    if(!a || a.value==="" || a.value===undefined) return;
    let val=a.label;
    if(a.type==="scale") val = FACES.find(f=>f.v===a.value).fe+" "+a.label;
    html+=`<div class="sumrow"><b>${q.q.replace(/[🎤📚🎮💬🍱✨🛠💭💌]/g,'').trim()}</b><br>${val}</div>`;
  });
  box.innerHTML=html;
}

function restart(){
  submitted=false;
  const st=document.getElementById("saveStatus");
  if(st){ st.innerHTML="💾 응답 저장 중…"; st.style.color="#b6a98f"; }
  for(let k in answers) delete answers[k];
  document.querySelectorAll(".face,.opt").forEach(e=>e.classList.remove("sel"));
  document.querySelectorAll("textarea").forEach(t=>t.value="");
  document.querySelectorAll(".btn-next[id^=next]").forEach(b=>{
    const qi=+b.id.replace("next","");
    if(questions[qi].type!=="text") b.disabled=true;
  });
  idx=-1; show(-1);
  document.getElementById("progressTop").style.display="none";
}

function downloadAnswers(){
  let lines=["2026 포천·가평 청소년자치기구 연합 교류활동 만족도 조사","응답일시: "+new Date().toLocaleString("ko-KR"),"-----------------------------------"];
  questions.forEach((q,i)=>{
    const a=answers[i];
    let val = a ? (a.type==="scale" ? a.value+"점 ("+a.label+")" : a.label) : "(무응답)";
    if(val==="") val="(무응답)";
    lines.push((i+1)+". "+q.q+"\n   → "+val);
  });
  const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="만족도조사_응답.txt"; a.click();
  URL.revokeObjectURL(url);
}

// confetti
function burst(){
  const colors=["#ff5d73","#ffb03a","#2fc6a0","#4f7dff","#ffd86b"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[i%colors.length];
    c.style.transform="rotate("+Math.random()*360+"deg)";
    document.body.appendChild(c);
    const fall=900+Math.random()*1400;
    c.animate([
      {transform:`translateY(0) rotate(0)`,opacity:1},
      {transform:`translateY(105vh) rotate(${600+Math.random()*400}deg)`,opacity:.9}
    ],{duration:fall,easing:"cubic-bezier(.3,.6,.5,1)"}).onfinish=()=>c.remove();
  }
}
